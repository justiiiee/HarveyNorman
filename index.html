<!DOCTYPE html>
<html>
<head>
  <title>Work Tracker</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 { color: #38bdf8; }
    .box {
      background: #1e293b;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #38bdf8;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>💼 Work Hour Tracker</h1>

<div class="box">
  <h3>Add Work</h3>
  <input type="date" id="date">
  <input type="number" id="hours" placeholder="Hours worked">
  <button onclick="addWork()">Add</button>
</div>

<div class="box">
  <h3>Summary</h3>
  <p>Total Hours: <span id="totalHours">0</span></p>
  <p>Total Earnings (€8/hr): €<span id="earnings">0</span></p>
  <p>Target: 250 hrs</p>
  <p>Remaining Hours: <span id="remaining">250</span></p>
</div>

<div class="box">
  <h3>Work Log</h3>
  <ul id="log"></ul>
</div>

<script>
let totalHours = 0;
const rate = 8;
const target = 250;

function addWork() {
  const dateInput = document.getElementById("date").value;
  const hours = parseFloat(document.getElementById("hours").value);

  if (!dateInput || !hours) {
    alert("Enter date and hours!");
    return;
  }

  const selectedDate = new Date(dateInput);
  const day = selectedDate.getDay(); // 0 = Sunday

  if (day === 0) {
    alert("❌ Sundays are not allowed!");
    return;
  }

  totalHours += hours;

  document.getElementById("totalHours").innerText = totalHours;
  document.getElementById("earnings").innerText = totalHours * rate;
  document.getElementById("remaining").innerText = target - totalHours;

  const li = document.createElement("li");
  li.innerText = `${dateInput} - ${hours} hrs`;
  document.getElementById("log").appendChild(li);

  document.getElementById("hours").value = "";
}

// 🔥 Extra: Prevent selecting Sundays visually
document.getElementById("date").addEventListener("input", function() {
  const d = new Date(this.value);
  if (d.getDay() === 0) {
    alert("❌ Sundays are disabled!");
    this.value = "";
  }
});
</script>

</body>
</html>
