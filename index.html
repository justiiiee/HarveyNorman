<!DOCTYPE html>
<html lang="en">
<head>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#38bdf8">

<!-- PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker Pro</title>

<style>
:root {
  --bg: #0f172a;
  --text: white;
  --card: #1e293b;
}

.light {
  --bg: #f1f5f9;
  --text: black;
  --card: white;
}

body {
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 10px;
}

h1 {
  text-align: center;
}

.box {
  background: var(--card);
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
}

button, input {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: #38bdf8;
  font-weight: bold;
}

.progress {
  background: #334155;
  height: 20px;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(to right, #22c55e, #4ade80);
  width: 0%;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  background: #334155;
}

.worked {
  background: green;
}
</style>

</head>

<body>

<h1>💼 Work Tracker Pro</h1>

<div class="box">
<button onclick="toggleTheme()">🌙 Toggle Theme</button>
</div>

<div class="box">
<h3>Settings</h3>
<input type="number" id="rate" placeholder="€/hour">
<input type="number" id="target" placeholder="Target hours">
<button onclick="saveSettings()">Save</button>
</div>

<div class="box">
<h3>Add Work</h3>
<input type="date" id="date">
<input type="number" id="hours" placeholder="Hours">
<button onclick="addWork()">Add</button>
</div>

<div class="box">
<h3>Summary</h3>
<p>Total Hours: <span id="total"></span></p>
<p>Earnings: €<span id="earn"></span></p>
<p>Prediction: €<span id="predict"></span></p>
<div class="progress"><div class="progress-bar" id="bar"></div></div>
</div>

<div class="box">
<h3>Calendar</h3>
<div class="calendar" id="calendar"></div>
</div>

<div class="box">
<h3>Work Log</h3>
<ul id="log"></ul>
</div>

<div class="box">
<button onclick="exportPDF()">📄 Generate Payslip</button>
</div>

<script>

// STORAGE
let rate = localStorage.getItem("rate") || 8;
let target = localStorage.getItem("target") || 200;
let data = JSON.parse(localStorage.getItem("data")) || [];

document.getElementById("rate").value = rate;
document.getElementById("target").value = target;

function saveSettings() {
  rate = document.getElementById("rate").value;
  target = document.getElementById("target").value;
  localStorage.setItem("rate", rate);
  localStorage.setItem("target", target);
  render();
}

function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

// ADD WORK + BRO MOTIVATION
function addWork() {
  let date = document.getElementById("date").value;
  let hours = parseFloat(document.getElementById("hours").value);

  if (!date || !hours) return alert("Enter all fields");

  let d = new Date(date);
  if (d.getDay() === 0) return alert("❌ Sunday not allowed");

  if (hours < 5) alert("NO WORRY BRO WE CAN KEEP IT FUTURE DAYS");
  else if (hours < 6) alert("GOOD BRO");
  else if (hours > 10) alert("PWOLI BRO 🔥");
  else if (hours > 8) alert("GREAT BRO 💪");

  data.push({date, hours});
  save();
  render();
}

// EDIT
function editItem(i) {
  let h = prompt("Edit hours", data[i].hours);
  if (h) {
    data[i].hours = parseFloat(h);
    save();
    render();
  }
}

// DELETE
function deleteItem(i) {
  data.splice(i, 1);
  save();
  render();
}

// RENDER
function render() {
  let total = 0;
  let log = document.getElementById("log");
  log.innerHTML = "";

  let month = new Date().getMonth();
  let filtered = data.filter(d => new Date(d.date).getMonth() === month);

  filtered.forEach((d,i) => {
    total += d.hours;
    let li = document.createElement("li");
    li.innerHTML = `${d.date} - ${d.hours}h 
    <button onclick="editItem(${i})">✏️</button> 
    <button onclick="deleteItem(${i})">❌</button>`;
    log.appendChild(li);
  });

  document.getElementById("total").innerText = total;
  document.getElementById("earn").innerText = (total * rate).toFixed(2);

  let avg = total / (filtered.length || 1);
  let predict = avg * 26;

  document.getElementById("predict").innerText = (predict * rate).toFixed(2);
  document.getElementById("bar").style.width = (total/target*100) + "%";

  renderCalendar(filtered);
}

// CALENDAR
function renderCalendar(data) {
  let cal = document.getElementById("calendar");
  cal.innerHTML = "";

  for (let i=1;i<=31;i++) {
    let div = document.createElement("div");
    div.className = "day";

    let found = data.find(d => new Date(d.date).getDate() === i);
    if (found) div.classList.add("worked");

    div.innerText = i;
    cal.appendChild(div);
  }
}

// THEME
function toggleTheme() {
  document.body.classList.toggle("light");
}

// PDF PAYSLIP
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let month = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });

  let totalHours = 0;

  doc.setFontSize(18);
  doc.text("WORK PAYSLIP", 20, 20);

  doc.setFontSize(12);
  doc.text(`Month: ${month}`, 20, 30);
  doc.text(`Rate: €${rate}/hr`, 20, 37);

  let y = 50;
  doc.text("Date | Hours | Earnings", 20, y);
  y += 5;

  data.forEach(d => {
    totalHours += d.hours;
    let earn = (d.hours * rate).toFixed(2);
    doc.text(`${d.date} | ${d.hours}h | €${earn}`, 20, y);
    y += 7;
  });

  let totalEarn = totalHours * rate;
  let avg = totalHours / (data.length || 1);

  y += 10;
  doc.text(`Total Hours: ${totalHours}`, 20, y);
  y += 7;
  doc.text(`Average: ${avg.toFixed(2)} hrs`, 20, y);
  y += 7;
  doc.text(`Total Earnings: €${totalEarn.toFixed(2)}`, 20, y);

  y += 10;

  if (totalHours > 200) doc.text("INSANE WORK BRO 🔥", 20, y);
  else if (totalHours > 150) doc.text("GREAT CONSISTENCY BRO 💪", 20, y);
  else doc.text("KEEP PUSHING BRO ⚡", 20, y);

  doc.save(`Payslip_${month}.pdf`);
}

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

render();

</script>

</body>
</html>
